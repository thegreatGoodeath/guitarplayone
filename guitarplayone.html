<title>Violão — Campo Harmônico</title>
<style>
:root{--bg:#0f0a04;--surface:#1e1510;--surface2:#2a1e12;--border:rgba(192,144,80,0.25);--text:#e8d5b0;--text2:#a08060;--accent:#C09050}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;height:-webkit-fill-available}
body{width:100%;height:100vh;height:100dvh;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;width:100%;height:100%;padding:5px 8px 5px;gap:4px}
.topbar{display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.topbar label{font-size:12px;color:var(--text2)}
select{font-size:14px;font-weight:600;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--accent);cursor:pointer;-webkit-appearance:none;outline:none}
.mode-wrap,.view-wrap{display:flex;border:1px solid var(--border);border-radius:20px;overflow:hidden}
.mbtn,.vbtn{padding:4px 14px;font-size:12px;background:transparent;color:var(--text2);border:none;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.vbtn:first-child{border-right:1px solid var(--border)}
.mbtn.active,.vbtn.active{background:var(--surface2);color:var(--accent);font-weight:600}
.grade-row,.box-row{display:flex;gap:4px;flex-shrink:0;overflow-x:auto;padding-bottom:1px;-webkit-overflow-scrolling:touch}
.grade-row::-webkit-scrollbar,.box-row::-webkit-scrollbar{height:2px}
.grade-row::-webkit-scrollbar-thumb,.box-row::-webkit-scrollbar-thumb{background:var(--border)}
.gcard,.boxbtn{flex-shrink:0;min-width:60px;padding:4px 3px;border-radius:8px;border:2px solid transparent;cursor:pointer;text-align:center;transition:all 0.15s;background:var(--surface)}
.gcard .grau,.boxbtn .bnum{font-size:9px;opacity:0.7;margin-bottom:1px}
.gcard .cname,.boxbtn .bnote{font-size:13px;font-weight:600}
.gcard .tipo,.boxbtn .bfret{font-size:9px;margin-top:1px;opacity:0.8}
#neckWrap{flex:1;min-height:0;position:relative}
#neck{width:100%;height:100%;display:block;touch-action:manipulation}
.detail{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:12px;color:var(--text2);min-height:26px;line-height:1.5}
.detail strong{color:var(--text)}
.tag{display:inline-block;padding:1px 8px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid transparent}
#rotateHint{display:none;position:fixed;inset:0;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999}
#rotateHint p{font-size:14px;color:var(--text2);text-align:center;padding:0 24px}
@keyframes rot{0%,100%{transform:rotate(-15deg)}50%{transform:rotate(15deg)}}
@media(orientation:portrait){#rotateHint{display:flex}}
</style>
</head>
<body>
<div id="rotateHint">
  <svg width="56" height="56" viewBox="0 0 60 60" fill="none" style="animation:rot 2s ease-in-out infinite">
    <rect x="10" y="18" width="24" height="36" rx="4" stroke="#C09050" stroke-width="2"/>
    <rect x="26" y="6" width="36" height="24" rx="4" stroke="#C09050" stroke-width="2" opacity="0.4"/>
    <path d="M44 2L50 8L44 14" stroke="#C09050" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <p>Gire o celular para paisagem</p>
</div>

<div id="app">
  <div class="topbar">
    <label>Tom</label>
    <select id="rootSel" onchange="rebuild()">
      <option value="0">C</option><option value="1">C# / Db</option><option value="2">D</option>
      <option value="3">D# / Eb</option><option value="4">E</option><option value="5">F</option>
      <option value="6">F# / Gb</option><option value="7">G</option><option value="8">G# / Ab</option>
      <option value="9" selected>A</option><option value="10">A# / Bb</option><option value="11">B</option>
    </select>
    <div class="mode-wrap">
      <button class="mbtn" id="btnMaj" onclick="setMode('major',this)">Maior</button>
      <button class="mbtn active" id="btnMin" onclick="setMode('minor',this)">Menor</button>
    </div>
    <div class="view-wrap">
      <button class="vbtn active" id="vTriad" onclick="setView('triads',this)">Tríades</button>
      <button class="vbtn" id="vPenta" onclick="setView('penta',this)">Pentatônica</button>
    </div>
  </div>
  <div id="triadsPanel"><div class="grade-row" id="gradeRow"></div></div>
  <div id="pentaPanel" style="display:none"><div class="box-row" id="boxRow"></div></div>
  <div id="neckWrap"><canvas id="neck"></canvas></div>
  <div class="detail" id="detail">Selecione um grau para ver a tríade no braço.</div>
</div>

<script>
const NN=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
// Enharmonic pairs: note index -> [top-left label, bottom-right label]
const ENHARMONIC={1:['C#','Db'],3:['D#','Eb'],6:['F#','Gb'],8:['G#','Ab'],10:['A#','Bb']};
function isEnharmonic(note){return note in ENHARMONIC;}
const MAJ_INT=[0,2,4,5,7,9,11],MIN_INT=[0,2,3,5,7,8,10];
const MAJ_Q=['major','minor','minor','major','major','minor','dim'];
const MIN_Q=['minor','dim','major','minor','minor','major','major'];
const GRAUS_MAJ=['I','II','III','IV','V','VI','VII°'];
const GRAUS_MIN=['I','II°','III','IV','V','VI','VII'];
const PM_INT=[0,2,4,7,9],Pm_INT=[0,3,5,7,10];
const CC={
  major:{dot:'#1D9E75',fill:'rgba(29,158,117,0.18)',text:'#5DCAA5',stroke:'#0F6E56'},
  minor:{dot:'#7F77DD',fill:'rgba(127,119,221,0.18)',text:'#AFA9EC',stroke:'#534AB7'},
  dim:  {dot:'#D85A30',fill:'rgba(216,90,48,0.18)',text:'#F0997B',stroke:'#993C1D'},
};
const BC=[
  {dot:'#E24B4A',fill:'rgba(226,75,74,0.12)',text:'#F09595',stroke:'#A32D2D',bg:'rgba(226,75,74,0.07)'},
  {dot:'#378ADD',fill:'rgba(55,138,221,0.12)',text:'#85B7EB',stroke:'#185FA5',bg:'rgba(55,138,221,0.07)'},
  {dot:'#1D9E75',fill:'rgba(29,158,117,0.12)',text:'#5DCAA5',stroke:'#0F6E56',bg:'rgba(29,158,117,0.07)'},
  {dot:'#BA7517',fill:'rgba(186,117,23,0.12)',text:'#EF9F27',stroke:'#854F0B',bg:'rgba(186,117,23,0.07)'},
  {dot:'#7F77DD',fill:'rgba(127,119,221,0.12)',text:'#AFA9EC',stroke:'#534AB7',bg:'rgba(127,119,221,0.07)'},
];
const BN=['Box 1','Box 2','Box 3','Box 4','Box 5'];
const OPEN=[4,11,7,2,9,4];
const STR_NAMES=['E','B','G','D','A','e'];
const STRINGS=6,FRETS=15;
function noteAt(s,f){return(OPEN[s]+f)%12;}

let mode='minor',root=9,selGrau=-1,view='triads',selBox=-1;
const canvas=document.getElementById('neck');
const ctx=canvas.getContext('2d');

// Layout vars — calculados em resize()
let PL,PR,PT,PB,W,H,fW,sH;
// PL = espaço à esquerda para labels de corda
// PB = espaço abaixo para números de casa
// PT = margem acima do braço

function fretX(f){return PL+f*fW;}
function strY(s){return PT+s*sH;}
function getScale(){return(mode==='major'?MAJ_INT:MIN_INT).map(i=>(root+i)%12);}
function getQ(){return mode==='major'?MAJ_Q:MIN_Q;}
function getG(){return mode==='major'?GRAUS_MAJ:GRAUS_MIN;}
function getPenta(){return(mode==='major'?PM_INT:Pm_INT).map(i=>(root+i)%12);}
function getTriad(gi){const s=getScale();return[0,2,4].map(st=>s[(gi+st)%7]);}
function computeBoxes(){
  const p=getPenta(),boxes=[];
  for(let b=0;b<5;b++){
    const tgt=p[b];let sf=0;
    for(let f=0;f<=11;f++){if(noteAt(0,f)===tgt){sf=f;break;}}
    boxes.push({startFret:sf,endFret:sf+4,colIdx:b});
  }
  return boxes.sort((a,b)=>a.startFret-b.startFret);
}

function resize(){
  const wrap=document.getElementById('neckWrap');
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const cw=wrap.clientWidth, ch=wrap.clientHeight;
  if(cw<=0||ch<=0) return;
  canvas.width=cw*dpr; canvas.height=ch*dpr;
  canvas.style.width=cw+'px'; canvas.style.height=ch+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);

  // Espaço generoso fora do braço para labels
  PL = 36;   // espaço à esquerda → letras das cordas ficam aqui
  PR = 10;   // margem direita
  PT = 12;   // margem topo (dentro do braço)
  PB = 26;   // espaço abaixo → números das casas ficam aqui

  W = cw - PL - PR;
  H = ch - PT - PB;

  // Garante espaço mínimo entre cordas
  if(H/(STRINGS-1) < 20){
    PT = 8;
    PB = 22;
    H = ch - PT - PB;
  }

  fW = W/FRETS;
  sH = H/(STRINGS-1);
  draw();
}

function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function drawNeck(){
  const neckTop = PT - 10;
  const neckBot = PT + H + 10;
  const neckH   = neckBot - neckTop;

  // Madeira do braço — só ocupa entre PL e PL+W
  ctx.fillStyle='#B8893C';
  rrect(PL-2, neckTop, W+4, neckH, 6); ctx.fill();
  ctx.fillStyle='rgba(20,8,0,0.16)';
  rrect(PL-2, neckTop, W+4, neckH, 6); ctx.fill();

  // Trastes
  for(let f=0;f<=FRETS;f++){
    const x=fretX(f);
    ctx.beginPath();ctx.moveTo(x,neckTop);ctx.lineTo(x,neckBot);
    ctx.strokeStyle=f===0?'#111':'#7a5820';
    ctx.lineWidth=f===0?7:2;ctx.stroke();
    if(f>0){
      ctx.beginPath();ctx.moveTo(x+0.7,neckTop);ctx.lineTo(x+0.7,neckBot);
      ctx.strokeStyle='rgba(255,235,180,0.10)';ctx.lineWidth=0.7;ctx.stroke();
    }
  }

  // Marcadores de posição (dentro do braço)
  [3,5,7,9].forEach(f=>{
    ctx.beginPath();ctx.arc(fretX(f)-fW/2, PT+H/2, 4, 0, Math.PI*2);
    ctx.fillStyle='rgba(80,45,5,0.32)';ctx.fill();
  });
  [0.28,0.72].forEach(t=>{
    ctx.beginPath();ctx.arc(fretX(12)-fW/2, PT+H*t, 4, 0, Math.PI*2);
    ctx.fillStyle='rgba(80,45,5,0.32)';ctx.fill();
  });

  // Cordas (dentro do braço)
  const SW=[3.5,2.7,2.0,1.4,0.9,0.55];
  for(let s=0;s<STRINGS;s++){
    ctx.beginPath();ctx.moveTo(PL-2,strY(s));ctx.lineTo(PL+W+2,strY(s));
    ctx.strokeStyle='rgba(140,100,35,0.80)';ctx.lineWidth=SW[s];ctx.stroke();
  }

  // ── LABELS FORA DO BRAÇO ──────────────────────────────────────────────────

  // Letras das cordas — À ESQUERDA do braço (fora do rect)
  const strFs = Math.max(11, Math.min(14, Math.floor(sH * 0.48)));
  ctx.font = `bold ${strFs}px -apple-system,sans-serif`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(220,180,100,0.90)';
  for(let s=0;s<STRINGS;s++){
    // x = PL - 6 → garante que fica à esquerda da borda do braço
    ctx.fillText(STR_NAMES[s], PL - 7, strY(s));
  }

  // Números das casas — ABAIXO do braço (fora do rect)
  const fretFs = Math.max(10, Math.min(13, Math.floor(fW * 0.38)));
  ctx.font = `${fretFs}px -apple-system,sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(180,140,80,0.75)';
  for(let f=1;f<=FRETS;f++){
    // y = PT + H + 12 → logo abaixo da borda inferior do braço
    ctx.fillText(f, fretX(f)-fW/2, PT + H + 13);
  }

  ctx.textBaseline = 'alphabetic'; // reset
}

function dotR(isRoot){ return isRoot ? Math.min(12, sH*0.40) : Math.min(9, sH*0.30); }

function drawDot(x,y,R,fillColor,isRoot,fillBg){
  if(isRoot&&fillBg){
    ctx.beginPath();ctx.arc(x,y,R+4,0,Math.PI*2);
    ctx.fillStyle=fillBg;ctx.fill();
  }
  ctx.beginPath();ctx.arc(x,y,R,0,Math.PI*2);
  ctx.fillStyle=fillColor;ctx.fill();
  ctx.beginPath();ctx.arc(x,y,R,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=isRoot?1.5:0.7;ctx.stroke();
}

function noteLabel(note,x,y,R,isRoot){
  if(isEnharmonic(note)){
    drawSplitLabel(note,x,y,R,isRoot);
    return;
  }
  const fs=Math.max(8,Math.min(isRoot?11:10,R*0.90));
  ctx.font=(isRoot?'bold ':'')+fs+'px -apple-system,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#fff';
  ctx.fillText(NN[note],x,y);
  ctx.textBaseline='alphabetic';
}

function drawSplitLabel(note,x,y,R,isRoot){
  const [nameA,nameB]=ENHARMONIC[note];
  // Draw diagonal line dividing the circle
  ctx.save();
  ctx.beginPath();ctx.arc(x,y,R,0,Math.PI*2);ctx.clip();
  // top-left half (darker overlay)
  ctx.beginPath();
  ctx.moveTo(x-R,y+R);ctx.lineTo(x+R,y-R);ctx.lineTo(x-R,y-R);ctx.closePath();
  ctx.fillStyle='rgba(0,0,0,0.22)';ctx.fill();
  // diagonal separator line
  ctx.beginPath();ctx.moveTo(x-R,y+R);ctx.lineTo(x+R,y-R);
  ctx.strokeStyle='rgba(255,255,255,0.55)';ctx.lineWidth=1;ctx.stroke();
  ctx.restore();
  // Text sizes — adaptive to R
  const fs=Math.max(6,Math.min(isRoot?9:8,R*0.72));
  ctx.font=(isRoot?'bold ':'')+fs+'px -apple-system,sans-serif';
  ctx.fillStyle='#fff';
  ctx.textBaseline='middle';
  // top-left: nameA (sharp) — upper area
  ctx.textAlign='center';
  ctx.fillText(nameA, x - R*0.28, y - R*0.30);
  // bottom-right: nameB (flat) — lower area
  ctx.fillText(nameB, x + R*0.28, y + R*0.30);
  ctx.textBaseline='alphabetic';
}

function drawTriads(){
  const scale=getScale(),qualities=getQ();
  const triad  = selGrau>=0 ? getTriad(selGrau) : null;
  const trRoot = selGrau>=0 ? scale[selGrau]    : null;
  const selQ   = selGrau>=0 ? qualities[selGrau] : null;
  const selCol = selGrau>=0 ? CC[selQ]           : null;

  for(let s=0;s<STRINGS;s++){
    for(let f=0;f<=FRETS;f++){
      const note=noteAt(s,f);
      if(!scale.includes(note)) continue;
      const inTriad=triad&&triad.includes(note);
      const isRoot=note===trRoot;
      const x=f===0?PL:fretX(f)-fW/2, y=strY(s);

      if(selGrau===-1){
        const R=Math.min(8,sH*0.30);
        ctx.beginPath();ctx.arc(x,y,R,0,Math.PI*2);
        ctx.fillStyle='rgba(192,144,80,0.22)';ctx.fill();
        const fs=Math.max(7,Math.min(9,R*0.95));
        ctx.font=fs+'px -apple-system,sans-serif';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle='rgba(230,200,150,0.55)';
        if(isEnharmonic(note)){
          // small split for overview dots
          ctx.save();ctx.beginPath();ctx.arc(x,y,R,0,Math.PI*2);ctx.clip();
          ctx.beginPath();ctx.moveTo(x-R,y+R);ctx.lineTo(x+R,y-R);ctx.lineTo(x-R,y-R);ctx.closePath();
          ctx.fillStyle='rgba(0,0,0,0.18)';ctx.fill();
          ctx.beginPath();ctx.moveTo(x-R,y+R);ctx.lineTo(x+R,y-R);
          ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=0.8;ctx.stroke();
          ctx.restore();
          const eN=ENHARMONIC[note];
          const efs=Math.max(5,Math.min(6,R*0.65));
          ctx.font=efs+'px -apple-system,sans-serif';
          ctx.fillStyle='rgba(255,255,255,0.75)';
          ctx.fillText(eN[0],x-R*0.28,y-R*0.28);
          ctx.fillText(eN[1],x+R*0.28,y+R*0.28);
        } else {
          ctx.fillText(NN[note],x,y);
        }
        ctx.textBaseline='alphabetic';
      } else if(inTriad){
        const R=dotR(isRoot);
        drawDot(x,y,R,selCol.dot,isRoot,selCol.fill);
        noteLabel(note,x,y,R,isRoot);
      } else {
        const R=Math.min(7,sH*0.26);
        ctx.beginPath();ctx.arc(x,y,R,0,Math.PI*2);
        ctx.fillStyle='rgba(120,90,40,0.15)';ctx.fill();
        const fs=Math.max(6,Math.min(8,R*0.85));
        ctx.font=fs+'px -apple-system,sans-serif';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle='rgba(192,160,100,0.30)';
        ctx.fillText(NN[note],x,y);
        ctx.textBaseline='alphabetic';
      }
    }
  }
}

function drawPenta(){
  const penta=getPenta(),boxes=computeBoxes();

  // Regiões coloridas dos boxes
  boxes.forEach((box,i)=>{
    const col=BC[box.colIdx];
    const active=selBox===-1||selBox===i;
    if(!active) return;
    const x1=box.startFret===0?PL-2:fretX(box.startFret)-fW/2+1;
    const x2=fretX(box.endFret)+fW/2-1;
    const bx=Math.min(x1,x2),bw=Math.abs(x2-x1);
    const neckTop=PT-10;
    ctx.fillStyle=col.bg;
    rrect(bx,neckTop,bw,H+20,4);ctx.fill();
    ctx.fillStyle=col.dot+(selBox===i?'cc':'44');
    ctx.fillRect(bx,neckTop,3,H+20);
    // Label do box acima do braço
    ctx.font='bold 9px -apple-system,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillStyle=col.dot+(selBox===i?'dd':'44');
    ctx.fillText(BN[i],bx+bw/2,neckTop-2);
    ctx.textBaseline='alphabetic';
  });

  // Notas
  for(let s=0;s<STRINGS;s++){
    for(let f=0;f<=FRETS;f++){
      const note=noteAt(s,f);
      if(!penta.includes(note)) continue;
      let bIdx=-1;
      for(let bi=0;bi<boxes.length;bi++){if(f>=boxes[bi].startFret&&f<=boxes[bi].endFret){bIdx=bi;break;}}
      if(bIdx===-1) continue;
      const inSel=selBox===-1||selBox===bIdx;
      const col=BC[boxes[bIdx].colIdx];
      const isRoot=note===root;
      const x=f===0?PL:fretX(f)-fW/2, y=strY(s);
      const R=dotR(isRoot);
      ctx.globalAlpha=inSel?(isRoot?1:0.85):0.13;
      drawDot(x,y,R,col.dot,isRoot,col.fill);
      ctx.globalAlpha=inSel?1:0.20;
      noteLabel(note,x,y,R,isRoot);
      ctx.globalAlpha=1;
    }
  }
}

function draw(){
  if(!W||!H||H<10) return;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr);
  drawNeck();
  if(view==='triads') drawTriads(); else drawPenta();
}

function buildGradeRow(){
  const scale=getScale(),qualities=getQ(),graus=getG();
  const row=document.getElementById('gradeRow');row.innerHTML='';
  graus.forEach((g,i)=>{
    const q=qualities[i],col=CC[q];
    const nm=NN[scale[i]],lb=nm+(q==='minor'?'m':q==='dim'?'°':'');
    const c=document.createElement('div');
    c.className='gcard'+(selGrau===i?' active':'');
    c.style.cssText=`background:${col.fill};border-color:${selGrau===i?col.stroke:'transparent'}`;
    c.innerHTML=`<div class="grau" style="color:${col.text}">${g}</div><div class="cname" style="color:${col.dot}">${lb}</div><div class="tipo" style="color:${col.text}">${q}</div>`;
    c.onclick=()=>selectGrau(i);
    row.appendChild(c);
  });
}

function buildBoxRow(){
  const boxes=computeBoxes(),penta=getPenta();
  const row=document.getElementById('boxRow');row.innerHTML='';
  boxes.forEach((box,i)=>{
    const col=BC[box.colIdx],rn=NN[penta[box.colIdx]];
    const b=document.createElement('div');
    b.className='boxbtn'+(selBox===i?' active':'');
    b.style.cssText=`background:${col.fill};border-color:${selBox===i?col.stroke:'transparent'}`;
    b.innerHTML=`<div class="bnum" style="color:${col.text}">${BN[i]}</div><div class="bnote" style="color:${col.dot}">${rn}</div><div class="bfret" style="color:${col.text}">casa ${box.startFret}</div>`;
    b.onclick=()=>selectBox(i);
    row.appendChild(b);
  });
}

function rebuild(){
  root=parseInt(document.getElementById('rootSel').value);
  selGrau=-1;selBox=-1;
  buildGradeRow();buildBoxRow();draw();setDef();
}
function setMode(m,btn){
  mode=m;
  document.querySelectorAll('.mbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selGrau=-1;selBox=-1;
  buildGradeRow();buildBoxRow();draw();setDef();
}
function setView(v,btn){
  view=v;
  document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('triadsPanel').style.display=v==='triads'?'':'none';
  document.getElementById('pentaPanel').style.display=v==='penta'?'':'none';
  selGrau=-1;selBox=-1;
  if(v==='triads') buildGradeRow(); else buildBoxRow();
  draw();setDef();
}
function selectGrau(i){
  selGrau=(selGrau===i)?-1:i;
  buildGradeRow();draw();
  if(selGrau===-1){setDef();return;}
  const scale=getScale(),qualities=getQ(),graus=getG();
  const q=qualities[selGrau],col=CC[q];
  const triad=getTriad(selGrau);
  const cn=NN[scale[selGrau]]+(q==='minor'?'m':q==='dim'?'°':'');
  setDetail(`<span class="tag" style="background:${col.fill};color:${col.text};border-color:${col.stroke}">${graus[selGrau]} — ${cn} (${q})</span>&nbsp; Notas: <strong>${triad.map(n=>NN[n]).join(' — ')}</strong>`);
}
function selectBox(i){
  selBox=(selBox===i)?-1:i;
  buildBoxRow();draw();
  if(selBox===-1){setDef();return;}
  const boxes=computeBoxes(),box=boxes[i],col=BC[box.colIdx];
  const penta=getPenta(),notesInBox=[];
  for(let s=0;s<STRINGS;s++) for(let f=box.startFret;f<=box.endFret;f++){
    const n=noteAt(s,f);if(penta.includes(n)&&!notesInBox.includes(n)) notesInBox.push(n);
  }
  setDetail(`<span class="tag" style="background:${col.fill};color:${col.text};border-color:${col.stroke}">${BN[i]} · casa ${box.startFret}–${box.endFret}</span>&nbsp; <strong>${notesInBox.map(n=>NN[n]).join(' · ')}</strong>`);
}
function setDetail(h){document.getElementById('detail').innerHTML=h;}
function setDef(){
  if(view==='triads') setDetail('Selecione um grau para ver a tríade no braço.');
  else setDetail('Pentatônica <strong>'+NN[root]+(mode==='minor'?' menor':' maior')+'</strong> — '+getPenta().map(n=>NN[n]).join(' · ')+' · Toque um box para isolar.');
}

function handleClick(cx,cy){
  const rect=canvas.getBoundingClientRect();
  const mx=cx-rect.left, my=cy-rect.top;
  let best=null,bd=999;
  const notes=view==='penta'?getPenta():getScale();
  for(let s=0;s<STRINGS;s++) for(let f=0;f<=FRETS;f++){
    const note=noteAt(s,f);
    if(!notes.includes(note)) continue;
    const x=f===0?PL:fretX(f)-fW/2, y=strY(s);
    const d=Math.hypot(mx-x,my-y);
    if(d<bd){bd=d;best={s,f,note};}
  }
  if(!best||bd>28) return;
  const {s,f,note}=best;
  const SN=['Mi♭','Si','Sol','Ré','Lá','Mi♯'];
  if(view==='penta'){
    const penta=getPenta(),boxes=computeBoxes();
    let bIdx=-1;
    for(let bi=0;bi<boxes.length;bi++) if(f>=boxes[bi].startFret&&f<=boxes[bi].endFret){bIdx=bi;break;}
    const pi=penta.indexOf(note);
    const labels=mode==='major'?['1ª','2ª','3ª','5ª','6ª']:['1ª','b3ª','4ª','5ª','b7ª'];
    const col=bIdx>=0?BC[boxes[bIdx].colIdx]:BC[0];
    setDetail(`Nota <strong>${NN[note]}</strong> · ${SN[s]} · casa ${f===0?'aberta':f}`+
      (bIdx>=0?` — <span class="tag" style="background:${col.fill};color:${col.text};border-color:${col.stroke}">${BN[bIdx]}</span>`:'')+
      (pi>=0?` <span style="color:var(--text2)">${labels[pi]}</span>`:''));
  } else {
    const scale=getScale(),qualities=getQ(),graus=getG();
    const gi=scale.indexOf(note);if(gi===-1) return;
    const q=qualities[gi],col=CC[q];
    const cn=NN[scale[gi]]+(q==='minor'?'m':q==='dim'?'°':'');
    setDetail(`Nota <strong>${NN[note]}</strong> · ${SN[s]} · casa ${f===0?'aberta':f} — <span class="tag" style="background:${col.fill};color:${col.text};border-color:${col.stroke}">${graus[gi]} — ${cn}</span>`);
  }
}

canvas.addEventListener('click',e=>handleClick(e.clientX,e.clientY));
canvas.addEventListener('touchend',e=>{e.preventDefault();const t=e.changedTouches[0];handleClick(t.clientX,t.clientY);},{passive:false});

function smartResize(){
  const vv=window.visualViewport;
  if(vv) document.getElementById('app').style.height=vv.height+'px';
  setTimeout(resize,50);
}
window.addEventListener('resize',smartResize);
window.addEventListener('orientationchange',()=>setTimeout(smartResize,350));
if(window.visualViewport) window.visualViewport.addEventListener('resize',smartResize);

window.addEventListener('DOMContentLoaded',()=>{
  buildGradeRow();buildBoxRow();setDef();
  setTimeout(smartResize,80);
});
</script>
</body>
</html>
